launcher_args: {experiment_name: predict_canopus,
  script_name: "src/ms_pred/clip/clip_predict.py",
  slurm_script: launcher_scripts/generic_slurm.sh, 
  launch_method: local,
  visible_devices: [2]
}
universal_args:
  _slurm_args:
  - {_num_gpu: 1, cpus-per-task: 4, job-name: forward_train, mem-per-cpu: 8G, 
    nodelist: 'node[1236]', time: '1-18:00:00'}
  gpu: [true]

  num-workers: [16]
  batch-size: [128]

  dataset-name: [canopus_train_public]
  split-name: [split_1.tsv]
  subset-datasets: [test_only]

  dataset-labels: [labels_confs.pkl]
  checkpoint: [/home/weiwentao/workspace/ms-pred/results/clip_train_canopus/split_1_rnd1/version_32/best-epoch=112-val_loss=1.4259.ckpt]
  
  save-dir: [/home/weiwentao/workspace/ms-pred/results/clip_train_canopus/split_1_rnd1/version_32/]
  binned-out: [true]

iterative_args:
  -  split-name: [split_1.tsv]
     magma-dag-folder: [results/dag_canopus_train_public/split_1_rnd1/preds_train_100_inten_corrected/]

