launcher_args: {experiment_name: clip_msg_continous_from_specvarse,
  script_name: "src/ms_pred/clip/clip_train.py",
  slurm_script: launcher_scripts/generic_slurm.sh, 
  launch_method: local,
  visible_devices: [4]
}
universal_args:
  _slurm_args:
  - {_num_gpu: 1, cpus-per-task: 7, job-name: forward_train, mem-per-cpu: 8G, 
    nodelist: 'node[1236]', time: '1-18:00:00'}
  debug: [false]
  debug-overfit: [false]
  gpu: [true]

  num-gpu: [1]

  seed: [42]
  num-workers: [8]
  batch-size: [128]
  max-epochs: [50]

  dataset-name: [msg]
  split-name: [split_msg.tsv]
  # random-split: [true]
  # train-val: [true]
  
  learning-rate: [0.00005]
  lr-decay-rate: [0.825]
  warm-up: [1000]
  weight-decay: [1e-5]
  patience: [20]

  dropout: [0.1]  # 0.1
  mpnn-type: [GGNN]
  pe-embed-k: [0]  # 14
  pool-op: [avg]
  hidden-size: [512] # 512

  frag-set-layers: [3] #[1]
  loss-fn: [cosine]

  root-encode: [egt2d]
  mabnet-layers: [4]  # 12
  mabnet-heads: [16]
  edge-update: [true]

  projection-dim: [512] # 512
  
  # inject-early: [true]
  binned-targs: [true] 
  embed-adduct: [true]
  embed-ce: [true]
  encode-forms: [true]

  grad-accumulate: [1]
  add-hs: [true]
  spec-sim-entropy: [true]

  # temperature: [0.07]
  # local-contra: [true]
  # local-weight: [0.5]
  # local-threshold: [0.0]
  # frag-supervised: [true]
  # frag-path: [/home/weiwentao/workspace/ms-pred/data/spec_datasets/msg/frags_index_map_observed.hdf5]
  # frag-supervised-weight: [0.5]
  # local-start-epochs: [5]
  # frags: [true]

  dataset-labels: [labels.tsv]
  # augment: [true]
  # mz-shift-aug-p: [0.3]
  # mz-shift-aug-max: [50]

  clip-ckpt: [/home/weiwentao/workspace/ms-pred/results/clip_spectraverse/split_1_rnd42/version_1/best.ckpt]

iterative_args:
